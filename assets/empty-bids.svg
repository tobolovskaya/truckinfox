<svg width="320" height="240" viewBox="0 0 320 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="320" height="240" rx="24" fill="#F5F7FA"/>
  <!-- Ground shadow -->
  <ellipse cx="160" cy="198" rx="96" ry="12" fill="#E6EBF2"/>

  <!-- Main card (clipboard / bid sheet) -->
  <rect x="88" y="52" width="144" height="132" rx="14" fill="#FFFFFF" stroke="#D7DEE8" stroke-width="3"/>
  <!-- Clipboard clip at top -->
  <rect x="132" y="44" width="56" height="20" rx="8" fill="#D7DEE8"/>
  <rect x="144" y="48" width="32" height="12" rx="5" fill="#EEF2F7"/>

  <!-- Price tag rows (empty / dashed) -->
  <rect x="108" y="80" width="104" height="14" rx="6" stroke="#E6EBF2" stroke-width="2" stroke-dasharray="6 4" fill="#F9FAFB"/>
  <rect x="108" y="104" width="80" height="14" rx="6" stroke="#E6EBF2" stroke-width="2" stroke-dasharray="6 4" fill="#F9FAFB"/>
  <rect x="108" y="128" width="92" height="14" rx="6" stroke="#E6EBF2" stroke-width="2" stroke-dasharray="6 4" fill="#F9FAFB"/>

  <!-- Price tag kr icon on left side of each row -->
  <circle cx="100" cy="87" r="6" fill="#EEF2F7"/>
  <circle cx="100" cy="111" r="6" fill="#EEF2F7"/>
  <circle cx="100" cy="135" r="6" fill="#EEF2F7"/>

  <!-- Gavel handle -->
  <rect x="162" y="148" width="60" height="10" rx="5" fill="#BFC9D8" transform="rotate(-35 162 148)"/>
  <!-- Gavel head -->
  <rect x="176" y="140" width="36" height="20" rx="6" fill="#FF8A65" transform="rotate(-35 176 140)"/>
  <!-- Gavel head highlight -->
  <rect x="182" y="138" width="20" height="8" rx="4" fill="#FFA580" transform="rotate(-35 182 138)"/>

  <!-- Decorative sparkle dots -->
  <circle cx="258" cy="68" r="7" fill="#FFE082"/>
  <circle cx="56" cy="84" r="5" fill="#A8D5F2"/>
  <circle cx="266" cy="168" r="5" fill="#FF8A65" opacity="0.45"/>
  <circle cx="52" cy="172" r="4" fill="#4CAF50" opacity="0.45"/>
</svg>
